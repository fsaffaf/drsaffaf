<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistical Test Selector</title>
  <style>
    body {
      font-family: Verdana, Geneva, sans-serif;
      background: #f7fbfd;
      margin: 0;
      padding: 40px 20px;
      color: #1f2d3d;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #4a5a6a;
    }

    .step {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 14px;
      border: 1px solid #c6ddea;
      border-radius: 10px;
      font-size: 16px;
      background: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      background: #0d4a75;
      color: white;
    }

    button:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 30px;
      padding: 24px;
      border-radius: 14px;
      background: #eaf6fc;
      border: 1px solid #c6ddea;
      display: none;
    }

    .result h2 {
      margin-top: 0;
      color: #0d4a75;
    }

    .test-name {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Statistical Test Selector</h1>
    <p class="subtitle">
      Select your study design to identify the correct statistical test.
    </p>

    <div class="step">
      <label for="measurement">Step 1: Level of Measurement</label>
      <select id="measurement">
        <option value="">Select an option</option>
        <option value="categorical_only">Variables are categorical only</option>
        <option value="categorical_continuous">One variable categorical + one continuous</option>
        <option value="continuous_only">Variables are continuous only</option>
      </select>
    </div>

    <div class="step">
      <label for="design">Step 2: Research Design</label>
      <select id="design">
        <option value="">Select an option</option>
        <option value="two_different_variables">Two different variables</option>
        <option value="expected_distribution">One variable vs expected distribution</option>
        <option value="between_subjects">Between-Subjects</option>
        <option value="within_subjects">Within-Subjects</option>
        <option value="relationship">Testing relationship between two variables</option>
      </select>
    </div>

    <div class="step">
      <label for="normality">Step 3: Is the Data Normal?</label>
      <select id="normality">
        <option value="">Select an option</option>
        <option value="normal">Normal</option>
        <option value="not_normal">NOT Normal</option>
        <option value="na">Does Not Apply</option>
      </select>
    </div>

    <button onclick="findTest()">Find My Statistical Test</button>

    <div class="result" id="resultBox">
      <h2>Recommended Test</h2>
      <div class="test-name" id="testResult"></div>
    </div>
  </div>

  <script>
    const rules = [
      {
        measurement: "categorical_only",
        design: "two_different_variables",
        normality: "na",
        test: "Chi-Square Test of Independence"
      },
      {
        measurement: "categorical_only",
        design: "expected_distribution",
        normality: "na",
        test: "Chi-Square Goodness of Fit"
      },
      {
        measurement: "categorical_continuous",
        design: "between_subjects",
        normality: "normal",
        test: "Independent t-test"
      },
      {
        measurement: "categorical_continuous",
        design: "between_subjects",
        normality: "not_normal",
        test: "Mann–Whitney U"
      },
      {
        measurement: "categorical_continuous",
        design: "within_subjects",
        normality: "normal",
        test: "Dependent t-test"
      },
      {
        measurement: "categorical_continuous",
        design: "within_subjects",
        normality: "not_normal",
        test: "Wilcoxon Signed-Rank"
      },
      {
        measurement: "continuous_only",
        design: "relationship",
        normality: "normal",
        test: "Pearson Correlation"
      },
      {
        measurement: "continuous_only",
        design: "relationship",
        normality: "not_normal",
        test: "Spearman Correlation"
      }
    ];

    function findTest() {
      const measurement = document.getElementById("measurement").value;
      const design = document.getElementById("design").value;
      const normality = document.getElementById("normality").value;

      const match = rules.find(rule =>
        rule.measurement === measurement &&
        rule.design === design &&
        rule.normality === normality
      );

      const resultBox = document.getElementById("resultBox");
      const testResult = document.getElementById("testResult");

      if (match) {
        testResult.textContent = match.test;
      } else {
        testResult.textContent = "No matching test found. Please review your selections.";
      }

      resultBox.style.display = "block";
    }
  </script>
</body>
</html>
