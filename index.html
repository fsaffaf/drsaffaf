<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistical Test Selector (Branching)</title>
  <style>
    body {
      font-family: Verdana, Geneva, sans-serif;
      background: #f7fbfd;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1 { text-align: center; }

    .step {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #c6ddea;
      border-radius: 12px;
      background: #f0f8ff;
    }

    .hidden { display: none; }

    button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #0d4a75;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    .result {
      margin-top: 25px;
      padding: 20px;
      background: #eaf6fc;
      border-radius: 12px;
      display: none;
      border: 1px solid #c6ddea;
    }

    .test {
      font-size: 22px;
      font-weight: bold;
      color: #0d4a75;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Statistical Test Selector</h1>

  <!-- STEP 1 -->
  <div class="step" id="step1">
    <h3>Step 1: What is the level of measurement?</h3>
    <button onclick="chooseQ1('categorical')">Categorical only</button>
    <button onclick="chooseQ1('cat_cont')">Categorical + Continuous</button>
    <button onclick="chooseQ1('continuous')">Continuous only</button>
  </div>

  <!-- STEP 2A: CHI-SQUARE -->
  <div class="step hidden" id="chiStep">
    <h3>Step 2: Chi-Square Type?</h3>
    <button onclick="showResult('Chi-Square Test of Independence')">Two variables (independence)</button>
    <button onclick="showResult('Chi-Square Goodness of Fit')">One variable (expected distribution)</button>
  </div>

  <!-- STEP 2B: T-TEST -->
  <div class="step hidden" id="ttestStep">
    <h3>Step 2: Study Design?</h3>
    <button onclick="chooseTTest('between')">Between-subjects</button>
    <button onclick="chooseTTest('within')">Within-subjects</button>
  </div>

  <!-- STEP 3: NORMALITY FOR T-TEST -->
  <div class="step hidden" id="ttestNormal">
    <h3>Step 3: Is the data normal?</h3>
    <button onclick="showResult('Independent t-test')">Normal</button>
    <button onclick="showResult('Mann–Whitney / Wilcoxon Signed-Rank')">Not normal</button>
  </div>

  <!-- STEP 2C: CORRELATION -->
  <div class="step hidden" id="corrStep">
    <h3>Step 2: Relationship type?</h3>
    <button onclick="showResult('Pearson Correlation')">Normal data</button>
    <button onclick="showResult('Spearman Correlation')">Not normal</button>
  </div>

  <!-- RESULT -->
  <div class="result" id="resultBox">
    <h3>Recommended Test</h3>
    <div class="test" id="resultText"></div>
  </div>

</div>

<script>

function resetAll() {
  document.getElementById('chiStep').classList.add('hidden');
  document.getElementById('ttestStep').classList.add('hidden');
  document.getElementById('ttestNormal').classList.add('hidden');
  document.getElementById('corrStep').classList.add('hidden');
  document.getElementById('resultBox').style.display = 'none';
}

function chooseQ1(type) {
  resetAll();
  document.getElementById('step1').style.display = 'block';

  if (type === 'categorical') {
    document.getElementById('chiStep').classList.remove('hidden');
  }

  if (type === 'cat_cont') {
    document.getElementById('ttestStep').classList.remove('hidden');
  }

  if (type === 'continuous') {
    document.getElementById('corrStep').classList.remove('hidden');
  }
}

function chooseTTest(type) {
  window.ttestType = type;
  document.getElementById('ttestStep').classList.add('hidden');
  document.getElementById('ttestNormal').classList.remove('hidden');
}

function showResult(test) {
  document.getElementById('chiStep').classList.add('hidden');
  document.getElementById('ttestStep').classList.add('hidden');
  document.getElementById('ttestNormal').classList.add('hidden');
  document.getElementById('corrStep').classList.add('hidden');

  document.getElementById('resultText').innerText = test;
  document.getElementById('resultBox').style.display = 'block';
}

</script>

</body>
</html>
