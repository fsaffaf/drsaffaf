<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistical Test Selector (Responsive Flow)</title>

  <style>
    body {
      font-family: Verdana, Geneva, sans-serif;
      background: #f7fbfd;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* FLOW ROW (DESKTOP) */
    .flow {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      overflow-x: auto;
    }

    .step {
      min-width: 260px;
      background: #f0f8ff;
      border: 1px solid #c6ddea;
      border-radius: 12px;
      padding: 15px;
      flex-shrink: 0;
    }

    .step h3 {
      font-size: 16px;
      margin-top: 0;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #0d4a75;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      padding: 20px;
      background: #eaf6fc;
      border-radius: 12px;
      border: 1px solid #c6ddea;
      display: none;
    }

    .test {
      font-size: 22px;
      font-weight: bold;
      color: #0d4a75;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .flow {
        flex-direction: column;
        overflow-x: visible;
      }

      .step {
        min-width: 100%;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Statistical Test Selector</h1>

  <div class="flow">

    <!-- STEP 1 -->
    <div class="step">
      <h3>1. Measurement</h3>
      <button onclick="choose('measurement','categorical')">Categorical only</button>
      <button onclick="choose('measurement','cat_cont')">Categorical + Continuous</button>
      <button onclick="choose('measurement','continuous')">Continuous only</button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2" style="display:none;"></div>

    <!-- STEP 3 -->
    <div class="step" id="step3" style="display:none;"></div>

  </div>

  <!-- RESULT -->
  <div class="result" id="resultBox">
    <h3>Recommended Test</h3>
    <div class="test" id="resultText"></div>
  </div>

</div>

<script>

const state = {
  measurement: null,
  design: null,
  normality: null
};

function choose(type, value) {
  state[type] = value;

  if (type === 'measurement') renderStep2(value);
  if (type === 'design') renderStep3();
  if (type === 'normality') showResult();
}

function renderStep2(value) {
  const step2 = document.getElementById('step2');
  step2.style.display = 'block';

  if (value === 'categorical') {
    step2.innerHTML = `
      <h3>2. Chi-Square Type</h3>
      <button onclick="choose('design','two_var')">Two variables</button>
      <button onclick="choose('design','one_var')">One variable</button>
    `;
  }

  if (value === 'cat_cont') {
    step2.innerHTML = `
      <h3>2. Study Design</h3>
      <button onclick="choose('design','between')">Between-subjects</button>
      <button onclick="choose('design','within')">Within-subjects</button>
    `;
  }

  if (value === 'continuous') {
    step2.innerHTML = `
      <h3>2. Relationship Type</h3>
      <button onclick="choose('design','relationship')">Relationship between variables</button>
    `;
  }

  document.getElementById('step3').style.display = 'none';
}

function renderStep3() {
  const step3 = document.getElementById('step3');
  step3.style.display = 'block';

  step3.innerHTML = `
    <h3>3. Normality</h3>
    <button onclick="choose('normality','normal')">Normal</button>
    <button onclick="choose('normality','not_normal')">Not normal</button>
  `;
}

function showResult() {
  let test = 'No match';

  if (state.measurement === 'categorical' && state.design === 'two_var') {
    test = 'Chi-Square Test of Independence';
  }

  if (state.measurement === 'categorical' && state.design === 'one_var') {
    test = 'Chi-Square Goodness of Fit';
  }

  if (state.measurement === 'cat_cont' && state.design === 'between' && state.normality === 'normal') {
    test = 'Independent t-test';
  }

  if (state.measurement === 'cat_cont' && state.design === 'between' && state.normality === 'not_normal') {
    test = 'Mann–Whitney U';
  }

  if (state.measurement === 'cat_cont' && state.design === 'within' && state.normality === 'normal') {
    test = 'Dependent t-test';
  }

  if (state.measurement === 'cat_cont' && state.design === 'within' && state.normality === 'not_normal') {
    test = 'Wilcoxon Signed-Rank';
  }

  if (state.measurement === 'continuous' && state.normality === 'normal') {
    test = 'Pearson Correlation';
  }

  if (state.measurement === 'continuous' && state.normality === 'not_normal') {
    test = 'Spearman Correlation';
  }

  document.getElementById('resultText').innerText = test;
  document.getElementById('resultBox').style.display = 'block';
}

</script>

</body>
</html>
